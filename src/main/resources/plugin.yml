name: EasyPronouns
version: '1.2.0'
main: dev.piny.easyPronouns.EasyPronouns
api-version: '1.21'
prefix: EasyPronouns
authors: [ Ember <piny.dev> ]
description: Adds a server-side way to display people's pronouns!
website: https://modrinth.com/plugin/easypronouns
permissions:
  easypronouns.manage:
    description: Allows the player to manage the config and other people's pronouns.
    default: op
  easypronouns.set:
    description: Allows the player to set their pronouns.
    default: true
softdepend:
  - ProtocolLib
  - PlaceholderAPI